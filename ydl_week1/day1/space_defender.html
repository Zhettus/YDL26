<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Defender</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
        }
        canvas {
            display: block;
            border: 2px solid #00ff88;
            box-shadow: 0 0 20px rgba(0,255,136,0.5), 0 0 60px rgba(0,255,136,0.15);
        }
        #controls {
            margin-top: 10px;
            color: rgba(0,255,136,0.45);
            font-size: 12px;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
<canvas id="g"></canvas>
<div id="controls">← → / A D &nbsp;MOVE &nbsp;·&nbsp; SPACE SHOOT &nbsp;·&nbsp; K BOOST &nbsp;·&nbsp; ESC MENU</div>
<script>
/* ================================================================
   SPACE DEFENDER — Retro Arcade Space Shooter
   Single HTML file, no external dependencies.
   Controls: Arrow keys / A-D to move, Space to shoot, K to boost.
================================================================ */

// ── Canvas ───────────────────────────────────────────────────────
const cvs = document.getElementById('g');
const ctx = cvs.getContext('2d');
cvs.width  = 800;
cvs.height = 580;

// ── Synthesised Audio (no external files) ────────────────────────
let AC;
try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {}

const MASTER_VOL = 0.4; // global loudness scaler (0 = silent, 1 = original)

function tone(freq, wave, dur, vol = 0.22) {
    if (!AC) return;
    try {
        if (AC.state === 'suspended') AC.resume();
        const o = AC.createOscillator();
        const g = AC.createGain();
        o.connect(g); g.connect(AC.destination);
        o.type = wave;
        o.frequency.setValueAtTime(freq, AC.currentTime);
        o.frequency.exponentialRampToValueAtTime(freq * 0.15, AC.currentTime + dur);
        g.gain.setValueAtTime(vol * MASTER_VOL, AC.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + dur);
        o.start(); o.stop(AC.currentTime + dur);
    } catch (e) {}
}

const SFX = {
    shoot   : () => tone(880, 'square',   0.07, 0.15),
    kill    : () => tone(200, 'sawtooth', 0.22, 0.28),
    hit     : () => tone(440, 'sawtooth', 0.10, 0.18),
    breach  : () => { tone(120, 'square', 0.4, 0.35); tone(100, 'square', 0.55, 0.3); },
    over    : () => { tone(200,'sawtooth',0.5,0.4); setTimeout(()=>tone(150,'sawtooth',0.6,0.4),500); },
    boost   : () => { tone(523,'square',0.18,0.28);
                      setTimeout(()=>tone(784,'square',0.22,0.26),70);
                      setTimeout(()=>tone(1047,'square',0.30,0.24),150); },
    ufo     : () => { tone(700,'sine',0.12,0.14); setTimeout(()=>tone(900,'sine',0.12,0.14),130); },
    overheat: () => tone(130,'sawtooth',0.40,0.25)
};

// ── Game State ───────────────────────────────────────────────────
let phase      = 'start';   // 'start' | 'playing' | 'paused' | 'gameover'
let score      = 0;
let hp         = 100;
let tick       = 0;
let frame      = 0;         // always-incrementing counter for cosmetic animation
let shake      = 0;         // screen-shake countdown (frames)
let earthFlash = 0;         // red horizon flash countdown (frames)
let btnBounds  = null;      // game-over restart button rect for hit-test
let menuBtns   = [];        // clickable areas inside the pause menu
let menuSliders= [];        // draggable sliders inside the pause menu
let startBtn   = null;      // title-screen START button rect

// ── Weapon Overheat ──────────────────────────────────────────────
const HEAT_PER_SHOT = 0.12; // heat added per shot (0–1 scale)
const HEAT_COOL     = 0.006;// heat shed per frame
const HEAT_RECOVER  = 0.40; // overheat clears once heat drops to here
let heat       = 0;
let overheated = false;

// ── Boost Mode ───────────────────────────────────────────────────
const BOOST_REQ = 5;        // kills needed to earn one boost charge
const BOOST_MAX = 3;        // max stored charges
let boostKills  = 0;        // kills toward the next charge
let boostCharges= 0;        // charges available
let boostFlash  = 0;        // shockwave animation countdown

// ── Bonus UFO ────────────────────────────────────────────────────
let ufo = null;

// ── Starfield ────────────────────────────────────────────────────
const STARS = Array.from({ length: 200 }, () => ({
    x : Math.random() * cvs.width,
    y : Math.random() * cvs.height,
    r : Math.random() * 1.4 + 0.2,
    ph: Math.random() * Math.PI * 2,
    sp: Math.random() * 0.025 + 0.008
}));

// ── Player ───────────────────────────────────────────────────────
const P = { x: cvs.width / 2, y: cvs.height - 60, w: 48, h: 38, vx: 0 };

// ── Movement (slider-driven) ─────────────────────────────────────
// moveResponse 0 = floaty drift · 1 = snappy. moveSpeed scales the cap.
let moveResponse = 0.40;
let moveSpeed    = 0.62;

function moveParams() {
    return {
        accel   : 0.5  + moveResponse * 5.5,  // 0.50 .. 6.00
        friction: 0.94 - moveResponse * 0.44, // 0.94 .. 0.50
        maxSpd  : 3.5  + moveSpeed    * 5.5    // 3.50 .. 9.00
    };
}

// ── Keyboard ─────────────────────────────────────────────────────
const keys = {};
window.addEventListener('keydown', e => {
    keys[e.code] = true;
    if (e.code === 'Space') e.preventDefault();
    // Title screen: Space or Enter begins the game
    if (phase === 'start' && (e.code === 'Space' || e.code === 'Enter')) {
        startGame(); return;
    }
    // Escape toggles the pause menu (only while in a run)
    if (e.code === 'Escape' && (phase === 'playing' || phase === 'paused')) {
        phase        = phase === 'playing' ? 'paused' : 'playing';
        menuBtns     = [];
        menuSliders  = [];
        dragSliderId = null;
    }
    // K fires the screen-clearing boost (edge-triggered, no key-repeat)
    if (e.code === 'KeyK' && !e.repeat) tryBoost();
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

// ── Bullets ──────────────────────────────────────────────────────
let bullets  = [];
let lastShot = 0;
const SHOT_CD = 210; // ms cooldown between shots

function shoot() {
    if (overheated) return;            // weapon locked while cooling
    const now = performance.now();
    if (now - lastShot < SHOT_CD) return;
    lastShot = now;
    bullets.push({ x: P.x, y: P.y - 22, vy: -12, w: 4, h: 16 });
    SFX.shoot();
    heat = Math.min(1, heat + HEAT_PER_SHOT);
    if (heat >= 1) { overheated = true; SFX.overheat(); }
}

// ── Boost Activation ─────────────────────────────────────────────
function tryBoost() {
    if (phase !== 'playing' || boostCharges <= 0) return;
    boostCharges--;
    boostFlash = 22;
    shake      = 18;
    // Vaporise every alien currently on screen, awarding their points
    aliens.forEach(a => { score += a.pts; burst(a.x, a.y, a.color, 22); });
    aliens = [];
    if (ufo) { score += ufo.pts; burst(ufo.x, ufo.y, ufo.color, 30); ufo = null; }
    SFX.boost();
}

// ── Alien Definitions ────────────────────────────────────────────
// [color, radius, baseSpeed, maxHP, pointsPerKill]
const ALIEN_DEFS = [
    ['#ff3355', 20, 1.15, 1, 10],  // red — basic
    ['#ff8800', 25, 0.88, 2, 25],  // orange — medium
    ['#cc44ff', 30, 0.68, 3, 50],  // purple — heavy
];

let aliens = [];

function spawnAlien() {
    const wave = Math.floor(score / 200);
    const roll = Math.random();
    // Harder alien types unlock as the score (wave) rises
    const idx = (wave >= 4 && roll < 0.25) ? 2
              : (wave >= 2 && roll < 0.45) ? 1 : 0;

    const [color, r, baseSpd, maxHp, pts] = ALIEN_DEFS[idx];
    const speedBoost = 1 + score / 1600; // gradual speed scaling

    aliens.push({
        x   : r + Math.random() * (cvs.width - r * 2),
        y   : -r - 5,
        r, color, pts,
        hp  : maxHp, maxHp,
        vy  : baseSpd * speedBoost,
        ph  : Math.random() * Math.PI * 2  // wobble phase
    });
}

// Frames between spawns — compresses as score rises
function spawnEvery() {
    return Math.max(25, 105 - Math.floor(score / 75) * 4);
}

// ── Bonus UFO ────────────────────────────────────────────────────
function spawnUfo() {
    const dir = Math.random() < 0.5 ? 1 : -1;
    ufo = {
        dir,
        x  : dir > 0 ? -50 : cvs.width + 50,
        y  : 78 + Math.random() * 46,
        r  : 26,
        vx : dir * 3.4,
        color: '#ffd11a',
        pts: 150,
        hp : 2, maxHp: 2,
        ph : 0
    };
    SFX.ufo();
}

// ── Particles ────────────────────────────────────────────────────
let particles = [];

function burst(x, y, color, n = 16) {
    for (let i = 0; i < n; i++) {
        const a  = Math.random() * Math.PI * 2;
        const sp = Math.random() * 4.5 + 1;
        particles.push({
            x, y,
            vx   : Math.cos(a) * sp,
            vy   : Math.sin(a) * sp,
            life : 1.0,
            decay: 0.016 + Math.random() * 0.026,
            r    : Math.random() * 4 + 2,
            color
        });
    }
}

// ── Reset ────────────────────────────────────────────────────────
function reset() {
    score = 0; hp = 100; tick = 0; shake = 0; earthFlash = 0;
    phase = 'playing'; lastShot = 0; btnBounds = null;
    bullets = []; aliens = []; particles = [];
    heat = 0; overheated = false;
    boostKills = 0; boostCharges = 0; boostFlash = 0;
    ufo = null;
    P.x = cvs.width / 2; P.vx = 0;
}

// ── Begin a fresh run from the title screen ──────────────────────
function startGame() {
    if (AC && AC.state === 'suspended') AC.resume();
    reset(); // sets phase to 'playing'
}

// ── Pointer helpers ──────────────────────────────────────────────
function toCanvasCoords(e) {
    const rect = cvs.getBoundingClientRect();
    return {
        mx: (e.clientX - rect.left) * (cvs.width  / rect.width),
        my: (e.clientY - rect.top)  * (cvs.height / rect.height)
    };
}

let dragSliderId = null;
let dragTrack    = null;

function setSliderValue(id, t) {
    t = Math.max(0, Math.min(1, t));
    if      (id === 'response') moveResponse = t;
    else if (id === 'speed')    moveSpeed    = t;
}

// ── Click handler (game-over restart + pause menu buttons) ───────
cvs.addEventListener('click', e => {
    const { mx, my } = toCanvasCoords(e);

    if (phase === 'start' && startBtn &&
        mx >= startBtn.x && mx <= startBtn.x + startBtn.w &&
        my >= startBtn.y && my <= startBtn.y + startBtn.h) {
        startGame(); return;
    }

    if (phase === 'gameover' && btnBounds &&
        mx >= btnBounds.x && mx <= btnBounds.x + btnBounds.w &&
        my >= btnBounds.y && my <= btnBounds.y + btnBounds.h) {
        reset(); return;
    }

    if (phase === 'paused') {
        for (const btn of menuBtns) {
            if (mx >= btn.x && mx <= btn.x + btn.w &&
                my >= btn.y && my <= btn.y + btn.h) { btn.action(); return; }
        }
    }
});

// ── Slider dragging (pause menu) ─────────────────────────────────
cvs.addEventListener('mousedown', e => {
    if (phase !== 'paused') return;
    const { mx, my } = toCanvasCoords(e);
    for (const s of menuSliders) {
        if (mx >= s.x - 12 && mx <= s.x + s.w + 12 &&
            my >= s.y - 14 && my <= s.y + 14) {
            dragSliderId = s.id;
            dragTrack    = { x: s.x, w: s.w };
            setSliderValue(s.id, (mx - s.x) / s.w);
            e.preventDefault();
            return;
        }
    }
});
window.addEventListener('mouseup', () => { dragSliderId = null; dragTrack = null; });

// ── Hover cursor + live drag (game-over + pause menu) ────────────
cvs.addEventListener('mousemove', e => {
    const { mx, my } = toCanvasCoords(e);
    if (dragSliderId && dragTrack) {
        setSliderValue(dragSliderId, (mx - dragTrack.x) / dragTrack.w);
    }
    const inBtn    = (b) => mx >= b.x && mx <= b.x + b.w && my >= b.y && my <= b.y + b.h;
    const inSlider = (s) => mx >= s.x - 12 && mx <= s.x + s.w + 12 && my >= s.y - 14 && my <= s.y + 14;
    const over = (btnBounds && inBtn(btnBounds)) || menuBtns.some(inBtn) || menuSliders.some(inSlider)
              || (phase === 'start' && startBtn && inBtn(startBtn));
    cvs.style.cursor = over ? 'pointer' : 'default';
});

// ── Render helpers ───────────────────────────────────────────────
const glow   = (c, b) => { ctx.shadowColor = c; ctx.shadowBlur = b; };
const noGlow = ()     => { ctx.shadowBlur  = 0; };

// ── Draw: Background & Stars ─────────────────────────────────────
function drawBg() {
    ctx.fillStyle = '#03030f';
    ctx.fillRect(0, 0, cvs.width, cvs.height);
    STARS.forEach(s => {
        const a = 0.35 + 0.65 * (0.5 + 0.5 * Math.sin(frame * s.sp + s.ph));
        ctx.fillStyle = `rgba(255,255,255,${a.toFixed(2)})`;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fill();
    });
}

// ── Draw: Earth Horizon ──────────────────────────────────────────
function drawEarth() {
    const ey = cvs.height - 28;
    const fi = earthFlash / 20; // 0–1 flash intensity

    const g = ctx.createLinearGradient(0, ey, 0, cvs.height);
    g.addColorStop(0, `rgba(${Math.round(30 + 220 * fi)},${Math.round(100 * (1 - fi))},255,0.55)`);
    g.addColorStop(1, `rgba(${Math.round(10 + 180 * fi)},${Math.round(40  * (1 - fi))},130,0.90)`);
    ctx.fillStyle = g;
    ctx.fillRect(0, ey, cvs.width, 28);

    const lc = earthFlash > 0 ? '#ff4444' : '#5599ff';
    glow(lc, 12);
    ctx.strokeStyle = lc;
    ctx.lineWidth   = 1.5;
    ctx.setLineDash([14, 7]);
    ctx.beginPath(); ctx.moveTo(0, ey); ctx.lineTo(cvs.width, ey);
    ctx.stroke();
    ctx.setLineDash([]);
    noGlow();

    ctx.fillStyle = earthFlash > 0 ? 'rgba(255,180,180,0.9)' : 'rgba(160,200,255,0.80)';
    ctx.font      = '11px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText('✦  E A R T H  ✦', cvs.width / 2, cvs.height - 7);
    ctx.textAlign = 'left';
}

// ── Draw: Player Ship ────────────────────────────────────────────
function drawPlayer() {
    const { x, y, w, h } = P;

    const fl = 9 + Math.sin(tick * 0.3) * 4;
    const fg = ctx.createRadialGradient(x, y + h / 2 + 3, 0, x, y + h / 2 + 3, fl + 6);
    fg.addColorStop(0,   'rgba(255,220,60,0.95)');
    fg.addColorStop(0.5, 'rgba(255,100,0,0.5)');
    fg.addColorStop(1,   'rgba(255,30,0,0)');
    ctx.fillStyle = fg;
    ctx.beginPath();
    ctx.ellipse(x, y + h / 2 + 3, 7, fl, 0, 0, Math.PI * 2);
    ctx.fill();

    glow('#00ff88', 20);
    ctx.fillStyle = '#00ff88';
    ctx.beginPath();
    ctx.moveTo(x,            y - h / 2);
    ctx.lineTo(x - w / 2,    y + h / 2);
    ctx.lineTo(x - w / 3.5,  y + h / 5);
    ctx.lineTo(x,             y + h / 3);
    ctx.lineTo(x + w / 3.5,  y + h / 5);
    ctx.lineTo(x + w / 2,    y + h / 2);
    ctx.closePath();
    ctx.fill();
    noGlow();

    ctx.fillStyle = 'rgba(180,255,240,0.88)';
    ctx.beginPath();
    ctx.ellipse(x, y - 3, 7, 10, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = 'rgba(255,255,255,0.20)';
    ctx.beginPath();
    ctx.moveTo(x, y - h / 2 + 4);
    ctx.lineTo(x - 7, y + 3);
    ctx.lineTo(x + 7, y + 3);
    ctx.closePath();
    ctx.fill();
}

// ── Draw: Alien Saucer ───────────────────────────────────────────
function drawAlien(a) {
    ctx.save();
    ctx.translate(a.x, a.y);

    glow(a.color, 24);
    ctx.fillStyle = a.color;
    ctx.beginPath();
    ctx.ellipse(0, 0, a.r, a.r * 0.42, 0, 0, Math.PI * 2);
    ctx.fill();
    noGlow();

    const dg = ctx.createRadialGradient(0, -a.r * 0.14, 0, 0, -a.r * 0.14, a.r * 0.55);
    dg.addColorStop(0, 'rgba(255,255,255,0.40)');
    dg.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = dg;
    ctx.beginPath();
    ctx.ellipse(0, -a.r * 0.16, a.r * 0.5, a.r * 0.36, 0, Math.PI, 0);
    ctx.fill();

    glow('#fff', 7);
    ctx.fillStyle = '#ffffff';
    for (const lx of [-a.r * 0.5, 0, a.r * 0.5]) {
        ctx.beginPath();
        ctx.arc(lx, a.r * 0.1, 3, 0, Math.PI * 2);
        ctx.fill();
    }
    noGlow();

    if (a.maxHp > 1) {
        const bw = a.r * 2.4, bx = -bw / 2, by = a.r * 0.72;
        ctx.fillStyle = 'rgba(0,0,0,0.55)';
        ctx.fillRect(bx, by, bw, 5);
        ctx.fillStyle = a.hp / a.maxHp > 0.5 ? '#44ff44' : '#ff4444';
        ctx.fillRect(bx, by, bw * (a.hp / a.maxHp), 5);
    }

    ctx.restore();
}

// ── Draw: Bonus UFO ──────────────────────────────────────────────
function drawUfo() {
    if (!ufo) return;
    const a = ufo;
    const pulse = 0.5 + 0.5 * Math.sin(tick * 0.2);

    ctx.save();
    ctx.translate(a.x, a.y);

    // Saucer body
    glow(a.color, 24 + pulse * 14);
    ctx.fillStyle = a.color;
    ctx.beginPath();
    ctx.ellipse(0, 0, a.r, a.r * 0.4, 0, 0, Math.PI * 2);
    ctx.fill();
    noGlow();

    // Magenta dome
    const dg = ctx.createRadialGradient(0, -a.r * 0.2, 0, 0, -a.r * 0.2, a.r * 0.6);
    dg.addColorStop(0, 'rgba(255,120,255,0.9)');
    dg.addColorStop(1, 'rgba(255,120,255,0)');
    ctx.fillStyle = dg;
    ctx.beginPath();
    ctx.ellipse(0, -a.r * 0.18, a.r * 0.55, a.r * 0.42, 0, Math.PI, 0);
    ctx.fill();

    // Chasing rainbow running lights
    const lights = ['#ff4d4d', '#4dff4d', '#4d4dff', '#ffff4d'];
    glow('#fff', 8);
    for (let i = 0; i < 5; i++) {
        const lx = -a.r * 0.7 + i * (a.r * 0.35);
        ctx.fillStyle = lights[(i + Math.floor(tick / 6)) % lights.length];
        ctx.beginPath();
        ctx.arc(lx, a.r * 0.12, 3, 0, Math.PI * 2);
        ctx.fill();
    }
    noGlow();

    if (a.hp < a.maxHp) {
        const bw = a.r * 2.2, bx = -bw / 2, by = a.r * 0.7;
        ctx.fillStyle = 'rgba(0,0,0,0.55)';
        ctx.fillRect(bx, by, bw, 4);
        ctx.fillStyle = '#ffd11a';
        ctx.fillRect(bx, by, bw * (a.hp / a.maxHp), 4);
    }

    ctx.restore();

    // Floating value label
    glow(a.color, 10);
    ctx.fillStyle = a.color;
    ctx.font      = 'bold 12px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText('+' + a.pts, a.x, a.y - a.r * 0.7 - 6);
    noGlow();
    ctx.textAlign = 'left';
}

// ── Draw: Laser Bullet ───────────────────────────────────────────
function drawBullet(b) {
    glow('#ffff00', 14);
    ctx.fillStyle = '#ffee00';
    ctx.fillRect(b.x - b.w / 2, b.y - b.h / 2, b.w, b.h);
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(b.x - 1, b.y - b.h / 2 + 2, 2, b.h - 4);
    noGlow();
}

// ── Draw: Particle Debris ────────────────────────────────────────
function drawParticles() {
    particles.forEach(p => {
        ctx.globalAlpha = p.life;
        glow(p.color, 7);
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
        ctx.fill();
        noGlow();
    });
    ctx.globalAlpha = 1;
}

// ── Draw: Boost Shockwave ────────────────────────────────────────
function drawBoostFlash() {
    if (boostFlash <= 0) return;
    const t = boostFlash / 22;
    ctx.fillStyle = `rgba(0,255,136,${(t * 0.35).toFixed(3)})`;
    ctx.fillRect(0, 0, cvs.width, cvs.height);

    const maxR = Math.hypot(cvs.width, cvs.height) * 0.7;
    const rr   = (1 - t) * maxR;
    glow('#00ff88', 20);
    ctx.strokeStyle = `rgba(120,255,200,${(t * 0.8).toFixed(3)})`;
    ctx.lineWidth   = 6;
    ctx.beginPath();
    ctx.arc(P.x, P.y, rr, 0, Math.PI * 2);
    ctx.stroke();
    noGlow();
}

// ── Draw: HUD ────────────────────────────────────────────────────
function drawHUD() {
    ctx.fillStyle = 'rgba(0,0,0,0.68)';
    ctx.fillRect(0, 0, cvs.width, 50);
    glow('#00ff88', 4);
    ctx.strokeStyle = 'rgba(0,255,136,0.30)';
    ctx.lineWidth   = 1;
    ctx.beginPath(); ctx.moveTo(0, 50); ctx.lineTo(cvs.width, 50); ctx.stroke();
    noGlow();

    // Score (left)
    glow('#ffff00', 15);
    ctx.fillStyle   = '#ffff00';
    ctx.font        = 'bold 22px Courier New';
    ctx.textAlign   = 'left';
    ctx.fillText(`SCORE  ${score}`, 18, 33);
    noGlow();

    // Wave (centre)
    const wave = Math.floor(score / 200) + 1;
    glow('#aa88ff', 10);
    ctx.fillStyle   = '#aa88ff';
    ctx.font        = 'bold 15px Courier New';
    ctx.textAlign   = 'center';
    ctx.fillText(`WAVE ${wave}`, cvs.width / 2, 31);
    noGlow();

    // ── HP bar (right, top row) ──
    ctx.fillStyle   = '#cccccc';
    ctx.font        = 'bold 12px Courier New';
    ctx.textAlign   = 'right';
    ctx.fillText('HP', cvs.width - 166, 18);

    const bx = cvs.width - 160, by = 8, bw = 146, bh = 15;
    ctx.fillStyle = 'rgba(255,255,255,0.1)';
    ctx.fillRect(bx, by, bw, bh);

    const ratio   = Math.max(0, hp / 100);
    const hpColor = ratio > 0.55 ? '#22ee55' : ratio > 0.28 ? '#ffaa00' : '#ff2244';
    glow(hpColor, 12);
    ctx.fillStyle = hpColor;
    ctx.fillRect(bx, by, bw * ratio, bh);
    noGlow();

    ctx.fillStyle   = '#ffffff';
    ctx.font        = 'bold 10px Courier New';
    ctx.textAlign   = 'center';
    ctx.fillText(`${hp} / 100`, bx + bw / 2, by + 11);

    // ── HEAT bar (right, bottom row) ──
    ctx.fillStyle = overheated ? '#ff5555' : '#9fd8ff';
    ctx.font      = 'bold 11px Courier New';
    ctx.textAlign = 'right';
    ctx.fillText('HEAT', cvs.width - 166, 40);

    const hbx = cvs.width - 160, hby = 30, hbw = 146, hbh = 12;
    ctx.fillStyle = 'rgba(255,255,255,0.1)';
    ctx.fillRect(hbx, hby, hbw, hbh);

    let hc = overheated ? '#ff3322'
           : heat > 0.7 ? '#ff8800'
           : heat > 0.4 ? '#ffd11a' : '#22ddff';
    if (overheated && tick % 10 < 5) hc = '#ff8888';
    glow(hc, 10);
    ctx.fillStyle = hc;
    ctx.fillRect(hbx, hby, hbw * heat, hbh);
    noGlow();

    if (overheated) {
        ctx.fillStyle = '#ffdddd';
        ctx.font      = 'bold 9px Courier New';
        ctx.textAlign = 'center';
        ctx.fillText('OVERHEAT', hbx + hbw / 2, hby + 9);
    }

    ctx.textAlign = 'left';
}

// ── Draw: Boost Meter (bottom-left) ──────────────────────────────
function drawBoostHUD() {
    const x = 16, y = cvs.height - 86;
    const ready = boostCharges > 0;

    ctx.textAlign = 'left';
    ctx.font      = 'bold 12px Courier New';
    if (ready) glow('#00ff88', 8);
    ctx.fillStyle = ready ? '#00ff88' : 'rgba(160,200,255,0.6)';
    ctx.fillText('BOOST', x, y);
    noGlow();

    const pip = 14, gap = 6;
    for (let i = 0; i < BOOST_MAX; i++) {
        const lit = i < boostCharges;
        const pxp = x + i * (pip + gap), pyp = y + 8;
        if (lit) {
            glow('#00ff88', 10);
            ctx.fillStyle = '#00ff88';
            ctx.beginPath(); ctx.roundRect(pxp, pyp, pip, pip, 3); ctx.fill();
            noGlow();
        } else {
            ctx.strokeStyle = 'rgba(0,255,136,0.25)';
            ctx.lineWidth   = 1.5;
            ctx.beginPath(); ctx.roundRect(pxp, pyp, pip, pip, 3); ctx.stroke();
        }
    }

    // Progress toward the next charge
    const barX = x, barY = y + 30, barW = BOOST_MAX * (pip + gap) - gap, barH = 5;
    ctx.fillStyle = 'rgba(255,255,255,0.1)';
    ctx.fillRect(barX, barY, barW, barH);
    ctx.fillStyle = 'rgba(0,255,136,0.7)';
    ctx.fillRect(barX, barY, barW * (boostKills / BOOST_REQ), barH);

    if (ready) {
        glow('#00ff88', 6);
        ctx.fillStyle = '#00ff88';
        ctx.font      = 'bold 11px Courier New';
        ctx.fillText('PRESS [K]', x + BOOST_MAX * (pip + gap) + 6, y + 11);
        noGlow();
    }
}

// ── Draw: Game-Over Overlay ──────────────────────────────────────
function drawGameOver() {
    ctx.fillStyle = 'rgba(0,0,0,0.75)';
    ctx.fillRect(0, 0, cvs.width, cvs.height);

    const pw = 440, ph = 285;
    const px = cvs.width / 2 - pw / 2;
    const py = cvs.height / 2 - ph / 2;

    ctx.fillStyle = 'rgba(4,7,26,0.97)';
    glow('#ff3355', 40);
    ctx.strokeStyle = '#ff3355';
    ctx.lineWidth   = 2.5;
    ctx.beginPath();
    ctx.roundRect(px, py, pw, ph, 14);
    ctx.fill(); ctx.stroke();
    noGlow();

    glow('#ff3355', 30);
    ctx.fillStyle   = '#ff3355';
    ctx.font        = 'bold 54px Courier New';
    ctx.textAlign   = 'center';
    ctx.fillText('GAME OVER', cvs.width / 2, py + 74);
    noGlow();

    glow('#ffff00', 15);
    ctx.fillStyle = '#ffff00';
    ctx.font      = 'bold 28px Courier New';
    ctx.fillText(`SCORE  ${score}`, cvs.width / 2, py + 128);
    noGlow();

    const rank = score >= 1000 ? '★ LEGENDARY DEFENDER ★'
               : score >= 500  ? '✦ ELITE PILOT ✦'
               : score >= 200  ? 'SOLID EFFORT, COMMANDER'
               :                 'EARTH NEEDS A BETTER HERO';
    ctx.fillStyle = '#888888';
    ctx.font      = '14px Courier New';
    ctx.fillText(rank, cvs.width / 2, py + 165);

    const rx = cvs.width / 2 - 105;
    const ry = py + 195;
    const rw = 210, rh = 55;
    glow('#00ff88', 20);
    ctx.fillStyle = '#00ff88';
    ctx.beginPath();
    ctx.roundRect(rx, ry, rw, rh, 10);
    ctx.fill();
    noGlow();
    ctx.fillStyle = '#000000';
    ctx.font      = 'bold 20px Courier New';
    ctx.fillText('▶  PLAY AGAIN', cvs.width / 2, ry + 36);

    btnBounds  = { x: rx, y: ry, w: rw, h: rh };
    ctx.textAlign = 'left';
}

// ── Draw: Title / Start Screen ───────────────────────────────────
function drawStart() {
    // Soft veil so the starfield stays visible behind the title
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.fillRect(0, 0, cvs.width, cvs.height);

    const cx = cvs.width / 2;

    // Decorative bobbing saucers (one of each alien type)
    [ALIEN_DEFS[2], ALIEN_DEFS[1], ALIEN_DEFS[0]].forEach((d, i) => {
        const [color, r] = d;
        const ax = cx - 150 + i * 150;
        const ay = 150 + Math.sin(frame * 0.04 + i) * 10;
        drawAlien({ x: ax, y: ay, r, color, maxHp: 1, hp: 1 });
    });

    // Title — two-tone
    ctx.textAlign = 'center';
    glow('#00ff88', 32);
    ctx.fillStyle = '#00ff88';
    ctx.font = 'bold 64px Courier New';
    ctx.fillText('SPACE', cx, 282);
    glow('#aaffdd', 32);
    ctx.fillStyle = '#aaffdd';
    ctx.fillText('DEFENDER', cx, 346);
    noGlow();

    // Tagline
    ctx.fillStyle = 'rgba(160,200,255,0.85)';
    ctx.font = '15px Courier New';
    ctx.fillText('DEFEND EARTH FROM THE INVASION', cx, 382);

    // START button
    const bw = 220, bh = 60, bx = cx - bw / 2, by = 412;
    glow('#00ff88', 22);
    ctx.fillStyle = '#00ff88';
    ctx.beginPath(); ctx.roundRect(bx, by, bw, bh, 10); ctx.fill();
    noGlow();
    ctx.fillStyle = '#000000';
    ctx.font = 'bold 24px Courier New';
    ctx.fillText('▶  START', cx, by + 39);
    startBtn = { x: bx, y: by, w: bw, h: bh };

    // Blinking prompt
    if (Math.floor(frame / 30) % 2 === 0) {
        ctx.fillStyle = 'rgba(255,255,255,0.5)';
        ctx.font = '12px Courier New';
        ctx.fillText('CLICK START  OR  PRESS SPACE', cx, by + bh + 28);
    }

    // Controls hint
    ctx.fillStyle = 'rgba(0,255,136,0.4)';
    ctx.font = '12px Courier New';
    ctx.fillText('← → / A D  MOVE    ·    SPACE  SHOOT    ·    K  BOOST', cx, cvs.height - 48);

    ctx.textAlign = 'left';
}

// ── Draw: a single canvas slider ─────────────────────────────────
function drawSlider(x, y, w, value, id, leftLab, rightLab) {
    const trackH = 6;
    // Track background
    ctx.fillStyle = 'rgba(0,255,136,0.12)';
    ctx.beginPath(); ctx.roundRect(x, y, w, trackH, 3); ctx.fill();
    // Filled portion
    glow('#00ff88', 8);
    ctx.fillStyle = '#00ff88';
    ctx.beginPath(); ctx.roundRect(x, y, w * value, trackH, 3); ctx.fill();
    noGlow();
    // Handle
    const hx = x + w * value, hy = y + trackH / 2;
    glow('#00ff88', 12);
    ctx.fillStyle = '#eafff5';
    ctx.beginPath(); ctx.arc(hx, hy, 9, 0, Math.PI * 2); ctx.fill();
    noGlow();
    ctx.strokeStyle = '#00ff88'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(hx, hy, 9, 0, Math.PI * 2); ctx.stroke();
    // End labels
    ctx.fillStyle = 'rgba(0,255,136,0.45)';
    ctx.font      = '10px Courier New';
    ctx.textAlign = 'left';  ctx.fillText(leftLab,  x,     y + 22);
    ctx.textAlign = 'right'; ctx.fillText(rightLab, x + w, y + 22);
    ctx.textAlign = 'center';

    menuSliders.push({ id, x, y: hy, w });
}

// ── Draw: Pause / Settings Menu ──────────────────────────────────
function drawMenu() {
    menuBtns    = [];
    menuSliders = [];

    ctx.fillStyle = 'rgba(0,0,0,0.72)';
    ctx.fillRect(0, 0, cvs.width, cvs.height);

    const pw = 440, ph = 312;
    const px = cvs.width / 2 - pw / 2;
    const py = cvs.height / 2 - ph / 2;

    ctx.fillStyle = 'rgba(4,7,26,0.97)';
    glow('#00ff88', 35);
    ctx.strokeStyle = '#00ff88';
    ctx.lineWidth   = 2;
    ctx.beginPath(); ctx.roundRect(px, py, pw, ph, 14);
    ctx.fill(); ctx.stroke();
    noGlow();

    glow('#00ff88', 22);
    ctx.fillStyle   = '#00ff88';
    ctx.font        = 'bold 34px Courier New';
    ctx.textAlign   = 'center';
    ctx.fillText('⏸  PAUSED', cvs.width / 2, py + 48);
    noGlow();

    ctx.strokeStyle = 'rgba(0,255,136,0.20)';
    ctx.lineWidth   = 1;
    ctx.beginPath();
    ctx.moveTo(px + 24, py + 66); ctx.lineTo(px + pw - 24, py + 66);
    ctx.stroke();

    ctx.fillStyle = '#888888';
    ctx.font      = '13px Courier New';
    ctx.fillText('SHIP MOVEMENT', cvs.width / 2, py + 90);

    const sx = cvs.width / 2 - 150, sw = 300;

    // Slider 1 — responsiveness
    ctx.fillStyle = 'rgba(0,255,136,0.75)';
    ctx.font      = 'bold 12px Courier New';
    ctx.fillText('RESPONSIVENESS', cvs.width / 2, py + 110);
    drawSlider(sx, py + 120, sw, moveResponse, 'response', 'FLOATY', 'SNAPPY');

    // Slider 2 — max speed
    ctx.fillStyle = 'rgba(0,255,136,0.75)';
    ctx.font      = 'bold 12px Courier New';
    ctx.fillText('MAX SPEED', cvs.width / 2, py + 166);
    drawSlider(sx, py + 176, sw, moveSpeed, 'speed', 'SLOW', 'FAST');

    // Resume button
    const rw = 200, rh = 46, rx = cvs.width / 2 - rw / 2, ry = py + 214;
    glow('#00ff88', 14);
    ctx.fillStyle   = 'rgba(0,255,136,0.12)';
    ctx.strokeStyle = '#00ff88';
    ctx.lineWidth   = 1.5;
    ctx.beginPath(); ctx.roundRect(rx, ry, rw, rh, 9); ctx.fill(); ctx.stroke();
    noGlow();
    ctx.fillStyle = '#00ff88';
    ctx.font      = 'bold 18px Courier New';
    ctx.fillText('▶  RESUME', cvs.width / 2, ry + 30);
    menuBtns.push({ x: rx, y: ry, w: rw, h: rh,
        action: () => { phase = 'playing'; menuBtns = []; menuSliders = []; dragSliderId = null; } });

    ctx.fillStyle = 'rgba(255,255,255,0.22)';
    ctx.font      = '12px Courier New';
    ctx.fillText('drag sliders  ·  ESC to resume', cvs.width / 2, py + ph - 14);

    ctx.textAlign = 'left';
}

// ── Game Logic ───────────────────────────────────────────────────
function update() {
    tick++;

    // Player movement — derived from slider settings
    const mp = moveParams();
    if (keys['ArrowLeft'] || keys['KeyA'])       P.vx -= mp.accel;
    else if (keys['ArrowRight'] || keys['KeyD']) P.vx += mp.accel;
    else                                         P.vx *= mp.friction;

    P.vx = Math.max(-mp.maxSpd, Math.min(mp.maxSpd, P.vx));
    P.x  = Math.max(P.w / 2, Math.min(cvs.width - P.w / 2, P.x + P.vx));

    // Auto-fire while Space held (cooldown- and heat-gated inside shoot())
    if (keys['Space']) shoot();

    // Move bullets upward
    bullets.forEach(b => { b.y += b.vy; });
    bullets = bullets.filter(b => b.y > -b.h);

    // Move aliens — descend + gentle horizontal wobble
    aliens.forEach(a => {
        a.y += a.vy;
        a.x += Math.sin(tick * 0.04 + a.ph) * 0.75;
        a.x  = Math.max(a.r, Math.min(cvs.width - a.r, a.x));
    });

    // Bonus UFO — drift across the top, then despawn
    if (ufo) {
        ufo.x += ufo.vx;
        ufo.ph += 0.18;
        ufo.y  += Math.sin(ufo.ph) * 0.4;
        if ((ufo.dir > 0 && ufo.x > cvs.width + 60) ||
            (ufo.dir < 0 && ufo.x < -60)) ufo = null;
    } else if (tick > 300 && Math.random() < 0.0011) {
        spawnUfo();
    }

    // Aliens reaching Earth boundary
    const escaped = aliens.filter(a => a.y > cvs.height - 24);
    if (escaped.length) {
        escaped.forEach(a => burst(a.x, cvs.height - 28, a.color, 22));
        hp          = Math.max(0, hp - escaped.length * 10);
        shake       = 14;
        earthFlash  = 20;
        SFX.breach();
        aliens = aliens.filter(a => a.y <= cvs.height - 24);
        if (hp <= 0) { hp = 0; phase = 'gameover'; SFX.over(); return; }
    }

    // Bullet ↔ alien collision
    for (const b of bullets) {
        for (const a of aliens) {
            if (b.dead || a.dead) continue;
            const dx = b.x - a.x, dy = b.y - a.y;
            if (dx * dx + dy * dy < (a.r + b.w) * (a.r + b.w)) {
                b.dead = true;
                a.hp  -= 1;
                if (a.hp <= 0) {
                    a.dead = true;
                    score += a.pts;
                    burst(a.x, a.y, a.color, 20);
                    SFX.kill();
                    boostKills++;
                    if (boostKills >= BOOST_REQ) {
                        boostKills  -= BOOST_REQ;
                        boostCharges = Math.min(BOOST_MAX, boostCharges + 1);
                    }
                } else {
                    burst(b.x, b.y, '#ffffff', 5);
                    SFX.hit();
                }
            }
        }
    }
    bullets = bullets.filter(b => !b.dead);
    aliens  = aliens.filter(a => !a.dead);

    // Bullet ↔ UFO collision
    if (ufo) {
        for (const b of bullets) {
            if (b.dead) continue;
            const dx = b.x - ufo.x, dy = b.y - ufo.y;
            const rr = ufo.r + b.w;
            if (dx * dx + dy * dy < rr * rr) {
                b.dead = true;
                ufo.hp -= 1;
                if (ufo.hp <= 0) {
                    score += ufo.pts;
                    burst(ufo.x, ufo.y, ufo.color, 30);
                    burst(ufo.x, ufo.y, '#ffffff', 14);
                    SFX.kill();
                    boostKills++;
                    if (boostKills >= BOOST_REQ) {
                        boostKills  -= BOOST_REQ;
                        boostCharges = Math.min(BOOST_MAX, boostCharges + 1);
                    }
                    ufo = null;
                    break;
                } else {
                    burst(b.x, b.y, '#ffffff', 6);
                    SFX.hit();
                }
            }
        }
        bullets = bullets.filter(b => !b.dead);
    }

    // Age particles
    particles.forEach(p => {
        p.x += p.vx; p.y += p.vy;
        p.vx *= 0.93; p.vy *= 0.93;
        p.life -= p.decay;
    });
    particles = particles.filter(p => p.life > 0);

    // Spawn next alien
    if (tick % spawnEvery() === 0) spawnAlien();

    // Weapon cooling
    heat = Math.max(0, heat - HEAT_COOL);
    if (overheated && heat <= HEAT_RECOVER) overheated = false;

    // Decay timers
    if (shake      > 0) shake--;
    if (earthFlash > 0) earthFlash--;
    if (boostFlash > 0) boostFlash--;
}

// ── Main Loop ────────────────────────────────────────────────────
function loop() {
    frame++;

    const sx = shake ? (Math.random() - 0.5) * shake * 1.3 : 0;
    const sy = shake ? (Math.random() - 0.5) * shake * 1.3 : 0;

    ctx.save();
    ctx.translate(sx, sy);

    drawBg();
    drawEarth();

    if (phase === 'start') {
        drawStart();
    } else {
        if (phase === 'playing') update();

        bullets.forEach(drawBullet);
        aliens.forEach(drawAlien);
        drawUfo();
        drawParticles();
        drawPlayer();
        drawBoostFlash();
        drawHUD();
        drawBoostHUD();

        if (phase === 'paused')   drawMenu();
        if (phase === 'gameover') drawGameOver();
    }

    ctx.restore();
    requestAnimationFrame(loop);
}

loop();
</script>
